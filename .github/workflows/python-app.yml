name: Run Telegram Bot

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Show files (для отладки)
      run: |
        echo "=== Текущая папка ==="
        pwd
        echo "=== Файлы в корне ==="
        ls -la
        echo "=== Файлы в V2_Bot ==="
        ls -la V2_Bot/ || echo "Папка V2_Bot не найдена!"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f V2_Bot/requirements.txt ]; then 
          pip install -r V2_Bot/requirements.txt
        elif [ -f requirements.txt ]; then 
          pip install -r requirements.txt
        else
          echo "⚠️ requirements.txt не найден!"
        fi

    - name: Run bot
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      run: |
        if [ -f V2_Bot/main.py ]; then
          python V2_Bot/main.py
        elif [ -f main.py ]; then
          python main.py
        else
          echo "❌ main.py не найден!"
          exit 1
        fi
